<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI計算器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>BMI計算器</h1>
        <form id="bmiForm">
            <div class="input-group">
                <label for="height">身高（公尺）</label>
                <input 
                    type="number" 
                    id="height" 
                    placeholder="例如：1.75"
                    step="0.01"
                    min="0"
                    required
                >
            </div>
            <div class="input-group">
                <label for="weight">體重（公斤）</label>
                <input 
                    type="number" 
                    id="weight" 
                    placeholder="例如：70"
                    step="0.1"
                    min="0"
                    required
                >
            </div>
            <button type="submit" class="btn">計算BMI</button>
        </form>

        <div id="result" class="result hidden">
            <div class="bmi-value">
                <span class="label">你的BMI</span>
                <span class="number" id="bmiValue">-</span>
            </div>
            <div class="bmi-category" id="bmiCategory"></div>
            <button type="button" class="btn-reset" onclick="resetForm()">重新計算</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
