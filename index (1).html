<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BMI 計算機</title>
  <link rel="stylesheet" href="styles.css">
  </head>
<body>
  <main class="container">
    <h1>BMI 計算機</h1>

    <form id="bmiForm" class="form" novalidate>
      <label for="height">身高（公尺）</label>
      <input id="height" name="height" type="number" step="0.01" min="0" placeholder="例如 1.70" required>

      <label for="weight">體重（公斤）</label>
      <input id="weight" name="weight" type="number" step="0.1" min="0" placeholder="例如 65" required>

      <div class="buttons">
        <button type="submit" id="calc">計算 BMI</button>
        <button type="button" id="clear">清除</button>
      </div>
    </form>

    <section id="result" aria-live="polite" class="result hidden"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
